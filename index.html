<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZdravDash — Jihomoravský kraj</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f6fb;
  --surface: #ffffff;
  --surface2: #f5f9fd;
  --border: #dce6f0;
  --border-hover: #b8ccdd;
  --text: #1a2b3d;
  --text2: #4a6178;
  --text3: #8298ad;
  --accent: #1a82c4;
  --accent-light: #e8f2fb;
  --accent-bg: #d4ebfa;
  --green: #16864e;
  --green-bg: #e5f5ee;
  --red: #c53030;
  --red-bg: #fee5e5;
  --orange: #c27317;
  --orange-bg: #fef3e2;
  --purple: #6941a8;
  --purple-bg: #f0ebf8;
  --pharmacy: #b83280;
  --pharmacy-bg: #fce8f3;
  --radius: 10px;
  --shadow-sm: 0 1px 3px rgba(26,43,61,.06);
  --shadow-md: 0 4px 16px rgba(26,43,61,.08);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* === HEADER === */
.header {
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 16px;
  background: var(--surface);
  box-shadow: var(--shadow-sm);
  position: relative;
  z-index: 20;
}
.logo {
  font-size: 18px;
  font-weight: 700;
  color: var(--accent);
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 8px;
}
.logo-icon {
  width: 32px; height: 32px;
  background: var(--accent);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  color: white; font-size: 16px;
}
.logo span { color: var(--text3); font-weight: 400; font-size: 13px; }

/* === SEARCH === */
.search-wrap {
  flex: 1;
  max-width: 580px;
  position: relative;
}
.search-wrap input {
  width: 100%;
  padding: 10px 16px 10px 42px;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.search-wrap input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(26,130,196,.1);
  background: #fff;
}
.search-wrap input::placeholder { color: var(--text3); }
.search-icon {
  position: absolute; left: 14px; top: 50%;
  transform: translateY(-50%); color: var(--text3);
}
.suggestions {
  position: absolute; top: 100%; left: 0; right: 0;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; margin-top: 4px; max-height: 220px;
  overflow-y: auto; z-index: 100; display: none;
  box-shadow: var(--shadow-md);
}
.suggestions.active { display: block; }
.suggestions div {
  padding: 8px 14px; cursor: pointer; font-size: 13px;
  color: var(--text2); transition: background .12s;
}
.suggestions div:hover, .suggestions div.sel { background: var(--accent-light); color: var(--accent); }
.suggestions div mark { background: none; color: var(--accent); font-weight: 600; }

.stats-bar {
  display: flex; gap: 14px; margin-left: auto; white-space: nowrap;
}

/* === ADDRESS / LOCATION FILTER === */
.location-wrap {
  display: flex; gap: 6px; align-items: center; flex-shrink: 0;
}
.address-box {
  width: 240px;
  position: relative;
}
.address-box input {
  width: 100%;
  padding: 10px 30px 10px 34px;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.address-box input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(26,130,196,.1);
  background: #fff;
}
.address-box input::placeholder { color: var(--text3); }
.address-box input.active-filter {
  border-color: var(--green);
  background: var(--green-bg);
  padding-right: 30px;
}
.address-pin {
  position: absolute; left: 10px; top: 50%;
  transform: translateY(-50%); color: var(--text3); pointer-events: none;
}
.address-clear {
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  background: none; border: none; color: var(--text3); cursor: pointer;
  font-size: 13px; padding: 2px 4px; border-radius: 4px; line-height: 1;
}
.address-clear:hover { color: var(--red); background: var(--red-bg); }
.address-status {
  position: absolute; top: calc(100% + 2px); left: 0; right: 0;
  font-size: 11px; padding: 4px 10px; display: none;
  border-radius: 6px; z-index: 50; white-space: nowrap;
}
.address-status.show { display: block; }
.address-status.loading { color: var(--accent); background: var(--accent-light); }
.address-status.error { color: var(--red); background: var(--red-bg); }
.address-status.success { color: var(--green); background: var(--green-bg); }

.gps-btn {
  width: 38px; height: 38px; flex-shrink: 0;
  border: 1.5px solid var(--border); border-radius: 8px;
  background: var(--surface2); color: var(--text3);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all .2s;
}
.gps-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
.gps-btn.active { border-color: var(--green); color: var(--green); background: var(--green-bg); }
.gps-btn.loading { animation: pulse 1s ease infinite; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.5; } }

.dist-badge {
  display: inline-block; padding: 2px 7px; border-radius: 5px;
  font-size: 10px; font-weight: 600;
  font-family: 'JetBrains Mono', monospace;
  background: var(--green-bg); color: var(--green); white-space: nowrap;
}
.stat { font-size: 13px; color: var(--text3); }
.stat b { color: var(--accent); font-weight: 600; font-family: 'JetBrains Mono', monospace; }

/* === FILTER BAR === */
.filter-bar {
  padding: 8px 24px;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  z-index: 19;
}
.filter-group { display: flex; align-items: center; gap: 5px; }
.filter-label {
  font-size: 11px; font-weight: 600; color: var(--text3);
  text-transform: uppercase; letter-spacing: .4px; white-space: nowrap;
}
.filter-btn {
  padding: 5px 11px; border-radius: 6px; font-size: 12px; font-weight: 500;
  border: 1.5px solid var(--border); background: var(--surface);
  color: var(--text2); cursor: pointer; font-family: inherit;
  transition: all .15s; white-space: nowrap;
}
.filter-btn:hover { border-color: var(--accent); color: var(--accent); }
.filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.filter-btn.active-green { background: var(--green); color: #fff; border-color: var(--green); }
.filter-sep { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; }
.filter-clear {
  padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600;
  border: none; background: var(--red-bg); color: var(--red);
  cursor: pointer; font-family: inherit; transition: all .15s; display: none;
}
.filter-clear.show { display: inline-block; }
.filter-clear:hover { background: var(--red); color: #fff; }

/* === MAIN === */
.main {
  display: grid;
  grid-template-columns: 1fr;
  height: calc(100vh - 57px - 46px);
  transition: grid-template-columns .25s ease;
}
.main.has-detail {
  grid-template-columns: 340px 1fr;
}

/* === TABLE === */
.table-panel { overflow-y: auto; background: var(--surface); }
.table-panel table { width: 100%; border-collapse: collapse; font-size: 13px; }
.table-panel thead th {
  position: sticky; top: 0; background: var(--surface2);
  padding: 10px 14px; text-align: left; font-weight: 600;
  font-size: 10px; text-transform: uppercase; letter-spacing: .6px;
  color: var(--text3); border-bottom: 1.5px solid var(--border); z-index: 10;
}
.table-panel tbody tr {
  cursor: pointer; transition: background .12s;
  border-bottom: 1px solid var(--border);
}
.table-panel tbody tr:hover { background: var(--accent-light); }
.table-panel tbody tr.active {
  background: var(--accent-bg);
  border-left: 3px solid var(--accent);
}
.table-panel tbody td { padding: 8px 14px; color: var(--text2); vertical-align: top; }
.table-panel tbody td:first-child { color: var(--text); font-weight: 500; }

/* Compact mode when detail is open */
.main.has-detail .table-panel .col-tags { display: none; }

.tag {
  display: inline-block; padding: 2px 8px; border-radius: 5px;
  font-size: 10px; font-weight: 500; margin: 1px 2px;
}
.tag-more {
  display: inline-block; padding: 2px 6px; border-radius: 5px;
  font-size: 10px; font-weight: 600; margin: 1px 2px;
  background: var(--surface2); color: var(--text3); border: 1px solid var(--border);
}
.tag-obor { background: var(--accent-light); color: var(--accent); }
.tag-druh { background: var(--purple-bg); color: var(--purple); }
.tag-poist { background: var(--green-bg); color: var(--green); }

/* MHD */
.mhd-item { display: flex; gap: 10px; align-items: flex-start; padding: 8px 0; }
.mhd-item + .mhd-item { border-top: 1px solid var(--border); }
.mhd-num {
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--orange-bg); color: var(--orange);
  font-size: 10px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.mhd-info { flex: 1; }
.mhd-info .mname { font-size: 13px; font-weight: 500; color: var(--text); }
.mhd-info .mdetail { font-size: 12px; color: var(--text3); margin-top: 2px; }
.mhd-dist {
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  color: var(--orange); font-weight: 600; white-space: nowrap;
}

/* === PAGINATION === */
.pagination {
  padding: 10px 14px; display: flex; align-items: center;
  justify-content: center; gap: 8px;
  border-top: 1px solid var(--border); background: var(--surface);
  position: sticky; bottom: 0;
}
.pagination button {
  padding: 5px 12px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text2); border-radius: 6px;
  cursor: pointer; font-family: inherit; font-size: 12px; transition: all .12s;
}
.pagination button:hover:not(:disabled) { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }
.pagination button:disabled { opacity: .35; cursor: default; }
.page-info { font-size: 12px; color: var(--text3); font-family: 'JetBrains Mono', monospace; }

/* === DETAIL === */
.detail-panel {
  border-left: 1px solid var(--border);
  background: var(--surface2); overflow-y: auto;
  display: none;
}
.main.has-detail .detail-panel {
  display: flex;
  flex-direction: column;
}
.detail-close {
  position: absolute; top: 14px; right: 14px;
  width: 28px; height: 28px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--text3); cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s; z-index: 5;
}
.detail-close:hover { background: var(--red-bg); color: var(--red); border-color: var(--red); }
.detail-empty {
  display: flex; align-items: center; justify-content: center;
  height: 100%; color: var(--text3); font-size: 13px; text-align: center; padding: 32px;
}
.detail-header {
  padding: 18px 20px; border-bottom: 1px solid var(--border);
  background: var(--surface); position: relative;
}
.detail-header h2 { font-size: 20px; font-weight: 700; line-height: 1.3; margin-bottom: 8px; color: var(--text); padding-right: 40px; }
.detail-header .meta {
  font-size: 13px; color: var(--text3);
  display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px;
}
.detail-header .meta span { display: flex; align-items: center; gap: 4px; }
.detail-section {
  padding: 14px 20px; border-bottom: 1px solid var(--border);
  background: var(--surface);
  margin-bottom: 1px;
}
.detail-section h3 {
  font-size: 11px; text-transform: uppercase; letter-spacing: .6px;
  color: var(--text3); margin-bottom: 12px; font-weight: 600;
}

/* Hours */
.hours-dept { margin-bottom: 10px; }
.hours-dept .dept-name { font-size: 13px; font-weight: 600; color: var(--purple); margin-bottom: 5px; }
.hours-grid {
  display: grid; grid-template-columns: 36px 1fr; gap: 4px 12px; font-size: 13px;
}
.hours-grid .day { color: var(--text3); font-weight: 600; }
.hours-grid .time { color: var(--text2); font-family: 'JetBrains Mono', monospace; font-size: 12px; }
.hours-grid .time.closed { color: var(--red); }
.hours-grid .time.open { color: var(--green); font-weight: 500; }
.hours-grid .time.na { color: var(--text3); font-style: italic; }

.hours-unavailable {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px;
  background: var(--orange-bg);
  border-radius: 6px;
  color: var(--orange);
  font-size: 13px;
  font-weight: 500;
}

/* Pharmacy */
.pharm-item { display: flex; gap: 10px; align-items: flex-start; padding: 8px 0; }
.pharm-item + .pharm-item { border-top: 1px solid var(--border); }
.pharm-num {
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--pharmacy-bg); color: var(--pharmacy);
  font-size: 10px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.pharm-info { flex: 1; }
.pharm-info .pname { font-size: 13px; font-weight: 500; color: var(--text); }
.pharm-info .paddr { font-size: 12px; color: var(--text3); margin-top: 2px; }
.pharm-dist {
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  color: var(--green); font-weight: 600; white-space: nowrap;
}

/* Contact */
.contact-grid {
  display: grid; grid-template-columns: auto 1fr; gap: 6px 14px; font-size: 13px;
}
.contact-grid .label { color: var(--text3); font-weight: 500; }
.contact-grid .value { color: var(--text2); }
.contact-grid .value.dash { color: var(--text3); }
.contact-grid a { color: var(--accent); text-decoration: none; }
.contact-grid a:hover { text-decoration: underline; }

/* Accessibility */
.access-row { display: flex; flex-wrap: wrap; gap: 8px; }
.access-badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 7px 14px; border-radius: 6px;
  font-size: 13px; font-weight: 500;
}
.access-yes { background: var(--green-bg); color: var(--green); }
.access-partial { background: var(--orange-bg); color: var(--orange); }
.access-no { background: var(--red-bg); color: var(--red); }

/* Detail two-column body */
.detail-body {
  display: grid;
  grid-template-columns: 1fr 1fr;
  flex: 1;
  min-height: 0;
}
.detail-left {
  overflow-y: auto;
  border-right: 1px solid var(--border);
}
.detail-right {
  position: relative;
  min-height: 300px;
  padding: 16px;
  background: var(--surface2);
}
.detail-right #map {
  position: absolute;
  top: 16px; left: 16px; right: 16px; bottom: 16px;
  height: auto !important;
  margin: 0 !important;
  border-radius: 12px !important;
  border: 1px solid var(--border) !important;
  box-shadow: 0 2px 12px rgba(26,43,61,.1), inset 0 0 0 1px rgba(255,255,255,.6) !important;
  overflow: hidden;
}

#map {
  height: 210px; border-radius: 8px; margin: 0 20px 4px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
}

.loading {
  text-align: center; padding: 60px; color: var(--text3); font-size: 13px;
}
.spinner {
  width: 26px; height: 26px; border: 3px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin .6s linear infinite; margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }

@media (max-width: 900px) {
  .main { grid-template-columns: 1fr !important; }
  .main.has-detail .table-panel { max-height: 35vh; }
  .main.has-detail .detail-panel { border-left: none; border-top: 1px solid var(--border); }
  .detail-body { grid-template-columns: 1fr !important; }
  .detail-left { border-right: none !important; }
  .detail-right { min-height: 280px; padding: 12px; }
  .detail-right #map { position: relative !important; height: 250px !important; top: 0 !important; left: 0 !important; right: 0 !important; bottom: 0 !important; }
  .header { flex-wrap: wrap; }
  .location-wrap { width: 100%; order: 3; }
  .address-box { flex: 1; }
}
/* === AI CHAT === */
.chat-fab {
  position: fixed;
  bottom: 24px; right: 24px;
  width: 56px; height: 56px;
  border-radius: 50%;
  background: linear-gradient(135deg, #1a82c4, #0e5a8a);
  color: white;
  border: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  box-shadow: 0 4px 20px rgba(26,130,196,.35);
  z-index: 1000;
  transition: transform .2s, box-shadow .2s;
}
.chat-fab:hover { transform: scale(1.08); box-shadow: 0 6px 28px rgba(26,130,196,.45); }
.chat-fab.hidden { display: none; }

.chat-panel {
  position: fixed;
  bottom: 24px; right: 24px;
  width: 420px; height: 540px;
  background: var(--surface);
  border-radius: 16px;
  border: 1px solid var(--border);
  box-shadow: 0 12px 48px rgba(26,43,61,.15);
  z-index: 1001;
  display: none;
  flex-direction: column;
  overflow: hidden;
}
.chat-panel.open { display: flex; }

.chat-header {
  padding: 14px 16px;
  background: linear-gradient(135deg, #1a82c4, #0e5a8a);
  color: white;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.chat-header-icon {
  width: 32px; height: 32px; border-radius: 8px;
  background: rgba(255,255,255,.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}
.chat-header-text { flex: 1; }
.chat-header-text .title { font-size: 14px; font-weight: 600; }
.chat-header-text .subtitle { font-size: 11px; opacity: .8; }
.chat-close {
  width: 28px; height: 28px; border-radius: 6px;
  background: rgba(255,255,255,.15); border: none; color: white;
  cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
}
.chat-close:hover { background: rgba(255,255,255,.3); }

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.chat-msg {
  max-width: 88%;
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 13px;
  line-height: 1.5;
  word-break: break-word;
}
.chat-msg.user {
  align-self: flex-end;
  background: var(--accent);
  color: white;
  border-bottom-right-radius: 4px;
}
.chat-msg.ai {
  align-self: flex-start;
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.chat-msg.ai .ai-text { margin-bottom: 8px; }
.chat-msg.ai .ai-results { margin-top: 6px; }

.chat-result-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 8px 10px;
  margin: 4px 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  transition: background .12s, border-color .12s;
  font-size: 12px;
}
.chat-result-item:hover { background: var(--accent-light); border-color: var(--accent); }
.chat-result-num {
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--accent-light); color: var(--accent);
  font-size: 10px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 1px;
}
.chat-result-info { flex: 1; }
.chat-result-info .cr-name { font-weight: 600; color: var(--text); }
.chat-result-info .cr-addr { color: var(--text3); font-size: 11px; margin-top: 1px; }
.chat-result-info .cr-tags { margin-top: 3px; }
.chat-result-info .cr-tags .tag { font-size: 9px; padding: 1px 5px; }

.chat-filters {
  display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px;
}
.chat-filter-tag {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 2px 8px; border-radius: 5px;
  font-size: 10px; font-weight: 500;
  background: var(--accent-light); color: var(--accent);
}

.chat-input-area {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  background: var(--surface);
  flex-shrink: 0;
}
.chat-input-area input {
  flex: 1;
  padding: 10px 14px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-size: 13px;
  font-family: inherit;

<script>
// ==================== AI CHAT ====================

let chatOpen = false;

function toggleChat() {
  chatOpen = !chatOpen;
  document.getElementById('chatPanel').classList.toggle('open', chatOpen);
  document.getElementById('chatFab').classList.toggle('hidden', chatOpen);
  if (chatOpen) document.getElementById('chatInput').focus();
}

function sendExample(btn) {
  const text = btn.textContent.replace(/^[^\s]+\s/, ''); // Remove emoji prefix
  document.getElementById('chatInput').value = text;
  sendChat();
}

async function sendChat() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg) return;

  const messages = document.getElementById('chatMessages');
  const sendBtn = document.getElementById('chatSend');

  // Remove welcome if present
  const welcome = messages.querySelector('.chat-welcome');
  if (welcome) welcome.remove();

  // Add user message
  messages.innerHTML += `<div class="chat-msg user">${escHtml(msg)}</div>`;
  input.value = '';
  sendBtn.disabled = true;

  // Add typing indicator
  messages.innerHTML += `<div class="chat-typing" id="chatTyping"><span></span><span></span><span></span></div>`;
  messages.scrollTop = messages.scrollHeight;

  try {
    const resp = await fetch('/api/ai_chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg })
    });
    const data = await resp.json();

    // Remove typing
    const typing = document.getElementById('chatTyping');
    if (typing) typing.remove();

    // Build AI response
    let html = `<div class="chat-msg ai">`;
    html += `<div class="ai-text">${escHtml(data.ai_response)}</div>`;

    // Show applied filters
    const filters = data.filters || {};
    const filterKeys = Object.keys(filters);
    if (filterKeys.length > 0) {
      html += `<div class="chat-filters">`;
      const labels = {
        oddelenie: '🏥', obec: '📍', poistovna: '💳',
        pristup: '♿', wc: '🚻', druh_zarizeni: '🏢'
      };
      for (const [k, v] of Object.entries(filters)) {
        html += `<span class="chat-filter-tag">${labels[k] || '🔍'} ${v}</span>`;
      }
      html += `</div>`;
    }

    // Show results
    if (data.results && data.results.length > 0) {
      html += `<div class="ai-results">`;
      html += `<div style="font-size:11px;color:var(--text3);margin-bottom:4px">Nájdených: ${data.total} výsledkov</div>`;
      data.results.slice(0, 5).forEach((r, i) => {
        const poist = (r.poistovne || []).map(p => `<span class="tag tag-poist">${p}</span>`).join('');
        const pristupTag = r.pristup ? `<span class="tag" style="background:var(--green-bg);color:var(--green)">♿ ${r.pristup}</span>` : '';
        html += `<div class="chat-result-item" onclick="chatOpenDetail(${r.id})">
          <div class="chat-result-num">${i + 1}</div>
          <div class="chat-result-info">
            <div class="cr-name">${escHtml(r.nazov)}</div>
            <div class="cr-addr">${escHtml(r.adresa)}</div>
            <div class="cr-tags">${poist} ${pristupTag}</div>
          </div>
        </div>`;
      });
      if (data.total > 5) {
        html += `<div style="font-size:11px;color:var(--text3);text-align:center;margin-top:4px">… a ďalších ${data.total - 5}</div>`;
      }
      html += `</div>`;
    }

    html += `</div>`;
    messages.innerHTML += html;

  } catch (e) {
    const typing = document.getElementById('chatTyping');
    if (typing) typing.remove();
    messages.innerHTML += `<div class="chat-msg ai">Chyba: nepodarilo sa spojiť s AI asistentom.</div>`;
  }

  sendBtn.disabled = false;
  messages.scrollTop = messages.scrollHeight;
}

function chatOpenDetail(id) {
  // Open detail in main dashboard
  selectRow(id);
  // Optionally minimize chat
  // toggleChat();
}

function escHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// Chat keyboard shortcut
document.getElementById('chatInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
  if (e.key === 'Escape') toggleChat();
});
</script>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const PAGE_SIZE = 50;
let currentQuery = '';
let currentPage = 0;
let totalResults = 0;
let currentResults = [];
let selectedId = null;
let suggestionsData = [];
let map = null;
let debounceTimer = null;
let addrDebounce = null;
let locationLat = null;
let locationLon = null;
let locationActive = false;
let activeFilters = { pristup: [], poistovna: [], wc: null };

// ==================== INIT ====================

async function init() {
  const stats = await fetchJson('/api/stats');
  suggestionsData = await fetchJson('/api/suggestions') || [];
  await doSearch('');

  const input = document.getElementById('searchInput');
  const suggBox = document.getElementById('suggestions');
  let suggIdx = -1;

  input.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    const q = input.value.trim();
    if (q.length >= 1) showSuggestions(q, suggBox);
    else suggBox.classList.remove('active');
    debounceTimer = setTimeout(() => { currentPage = 0; doSearch(q); }, 250);
  });

  input.addEventListener('keydown', (e) => {
    const items = suggBox.querySelectorAll('div');
    if (e.key === 'ArrowDown') { e.preventDefault(); suggIdx = Math.min(suggIdx + 1, items.length - 1); updateSel(items, suggIdx); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); suggIdx = Math.max(suggIdx - 1, -1); updateSel(items, suggIdx); }
    else if (e.key === 'Enter') {
      e.preventDefault();
      if (suggIdx >= 0 && items[suggIdx]) input.value = items[suggIdx].dataset.val;
      suggBox.classList.remove('active');
      suggIdx = -1;
      currentPage = 0;
      doSearch(input.value.trim());
    }
    else if (e.key === 'Escape') { suggBox.classList.remove('active'); suggIdx = -1; }
  });

  input.addEventListener('blur', () => setTimeout(() => suggBox.classList.remove('active'), 150));

  // === LOCATION FILTER ===
  const addrInput = document.getElementById('addressInput');
  addrInput.addEventListener('input', () => {
    clearTimeout(addrDebounce);
    if (!addrInput.value.trim()) { clearLocation(); return; }
    addrDebounce = setTimeout(() => geocodeAddress(addrInput.value.trim()), 700);
  });
  addrInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      clearTimeout(addrDebounce);
      if (addrInput.value.trim()) geocodeAddress(addrInput.value.trim());
    }
  });
  document.getElementById('addressClear').addEventListener('click', clearLocation);
  document.getElementById('gpsBtn').addEventListener('click', useMyLocation);
}

// ==================== API ====================

async function fetchJson(url) {
  try { return await (await fetch(url)).json(); }
  catch (e) { console.error('API error:', e); return null; }
}

async function doSearch(query) {
  currentQuery = query;
  let data;

  // Build filter query string
  let fq = '';
  activeFilters.pristup.forEach(v => fq += `&pristup=${encodeURIComponent(v)}`);
  activeFilters.poistovna.forEach(v => fq += `&poistovna=${encodeURIComponent(v)}`);
  if (activeFilters.wc !== null) fq += `&wc=${activeFilters.wc}`;

  if (locationActive && locationLat !== null) {
    data = await fetchJson(`/api/search_nearby?q=${encodeURIComponent(query)}&lat=${locationLat}&lon=${locationLon}&page=${currentPage}&limit=${PAGE_SIZE}${fq}`);
  } else {
    data = await fetchJson(`/api/search?q=${encodeURIComponent(query)}&page=${currentPage}&limit=${PAGE_SIZE}${fq}`);
  }
  if (!data) return;
  totalResults = data.total;
  currentResults = data.results;
  document.getElementById('countResults').textContent = totalResults.toLocaleString();
  renderTable();
}

async function loadDetail(id) {
  const panel = document.getElementById('detailPanel');
  panel.innerHTML = '<div class="loading" style="padding-top:100px"><div class="spinner"></div>Načítavam detail…</div>';
  const data = await fetchJson(`/api/detail/${id}`);
  if (!data || data.error) { panel.innerHTML = '<div class="detail-empty"><div>Chyba pri načítaní</div></div>'; return; }
  renderDetail(data);
}

// ==================== RENDER TABLE ====================

function renderTable() {
  const tbody = document.getElementById('tableBody');
  const thead = document.querySelector('.table-panel thead tr');
  const showDist = locationActive && currentResults.length > 0 && currentResults[0].vzdialenost_km !== undefined;
  const hasDetail = document.getElementById('mainLayout').classList.contains('has-detail');

  function buildPoistTags(item) {
    const p = item.poistovne || [];
    return p.length ? p.map(x => `<span class="tag tag-poist">${x}</span>`).join('') : '<span style="color:var(--text3)">-</span>';
  }

  if (currentResults.length === 0) {
    if (hasDetail) {
      thead.innerHTML = showDist
        ? '<th>Názov</th><th>Adresa</th><th style="text-align:right">Vzd.</th>'
        : '<th>Názov</th><th>Adresa</th>';
    } else {
      thead.innerHTML = showDist
        ? '<th>Názov</th><th class="col-tags">Obor / Oddelenie</th><th class="col-tags">Poisťovne</th><th>Adresa</th><th style="text-align:right">Vzdialenosť</th>'
        : '<th>Názov</th><th class="col-tags">Obor / Oddelenie</th><th class="col-tags">Poisťovne</th><th>Adresa</th>';
    }
    tbody.innerHTML = `<tr><td colspan="5"><div class="loading" style="padding:60px"><div style="font-size:36px;margin-bottom:10px">🔎</div>Žiadne výsledky. Skús iný výraz.</div></td></tr>`;
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  if (hasDetail) {
    thead.innerHTML = showDist
      ? '<th>Názov</th><th>Adresa</th><th style="text-align:right">Vzd.</th>'
      : '<th>Názov</th><th>Adresa</th>';
  } else {
    thead.innerHTML = showDist
      ? '<th>Názov</th><th class="col-tags">Obor / Oddelenie</th><th class="col-tags">Poisťovne</th><th>Adresa</th><th style="text-align:right">Vzdialenosť</th>'
      : '<th>Názov</th><th class="col-tags">Obor / Oddelenie</th><th class="col-tags">Poisťovne</th><th>Adresa</th>';
  }

  tbody.innerHTML = currentResults.map(item => {
    const allTags = item.oddelenia || [];
    const shown = allTags.slice(0, 3).map(o => `<span class="tag tag-obor">${o}</span>`).join('');
    const more = allTags.length > 3 ? `<span class="tag tag-more">+${allTags.length - 3}</span>` : '';
    const druh = item.druh_zarizeni && item.druh_zarizeni !== '-' ? `<span class="tag tag-druh">${item.druh_zarizeni}</span>` : '';
    
    if (hasDetail) {
      const distCol = showDist ? `<td style="text-align:right"><span class="dist-badge">${item.vzdialenost_km} km</span></td>` : '';
      return `<tr data-id="${item.id}" class="${item.id === selectedId ? 'active' : ''}" onclick="selectRow(${item.id})">
        <td>${item.nazov}</td>
        <td style="font-size:12px">${item.adresa}</td>
        ${distCol}
      </tr>`;
    } else {
      const distCol = showDist ? `<td style="text-align:right"><span class="dist-badge">${item.vzdialenost_km} km</span></td>` : '';
      return `<tr data-id="${item.id}" class="${item.id === selectedId ? 'active' : ''}" onclick="selectRow(${item.id})">
        <td>${item.nazov}</td>
        <td class="col-tags">${shown}${more}${druh}</td>
        <td class="col-tags">${buildPoistTags(item)}</td>
        <td>${item.adresa}</td>
        ${distCol}
      </tr>`;
    }
  }).join('');

  const totalPages = Math.ceil(totalResults / PAGE_SIZE);
  const pag = document.getElementById('pagination');
  if (totalPages <= 1) { pag.innerHTML = ''; return; }
  pag.innerHTML = `
    <button onclick="goPage(0)" ${currentPage===0?'disabled':''}>⟨⟨</button>
    <button onclick="goPage(${currentPage-1})" ${currentPage===0?'disabled':''}>⟨</button>
    <span class="page-info">${currentPage+1} / ${totalPages}</span>
    <button onclick="goPage(${currentPage+1})" ${currentPage>=totalPages-1?'disabled':''}>⟩</button>
    <button onclick="goPage(${totalPages-1})" ${currentPage>=totalPages-1?'disabled':''}>⟩⟩</button>`;
}

// ==================== RENDER DETAIL ====================

function renderDetail(item) {
  const panel = document.getElementById('detailPanel');
  const days = ['Po', 'Út', 'St', 'Čt', 'Pá', 'So', 'Ne'];

  const allDetailTags = item.oddelenia || [];

  // Prístupnosť a WC

    item.otvaracie_hodiny.forEach(dept => {
      hoursHtml += '<div class="hours-dept">';
      if (item.otvaracie_hodiny.length > 1) hoursHtml += `<div class="dept-name">${dept.oddelenie}</div>`;
      hoursHtml += '<div class="hours-grid">';
      days.forEach(d => {
        const time = dept.hodiny ? dept.hodiny[d] : null;
        let cls = 'na';
        let display = 'NEDOSTUPNÉ';
        if (time === null || time === undefined) {
          cls = 'na'; display = 'NEDOSTUPNÉ';
        } else if (time === 'zavřeno' || time === 'zavreno') {
          cls = 'closed'; display = 'zavřeno';
        } else {
          cls = 'open'; display = time;
        }
        hoursHtml += `<div class="day">${d}</div><div class="time ${cls}">${display}</div>`;
      });
      hoursHtml += '</div></div>';
    });
  }
  hoursHtml += '</div>';

  // Lekárne
  let pharmHtml = '<div class="detail-section"><h3>💊 Najbližšie lekárne</h3>';
  if (item.najblizsia_lekaren && item.najblizsia_lekaren.length > 0) {
    item.najblizsia_lekaren.forEach((p, i) => {
      pharmHtml += `<div class="pharm-item">
        <div class="pharm-num">${i + 1}</div>
        <div class="pharm-info">
          <div class="pname">${p.nazov}</div>
          <div class="paddr">${p.adresa}</div>
        </div>
        <div class="pharm-dist">${p.vzdialenost_km} km</div>
      </div>`;
    });
  } else {
    pharmHtml += '<div style="font-size:12px;color:var(--text3)">-</div>';
  }
  pharmHtml += '</div>';

  // MHD zastávky
  let mhdHtml = '<div class="detail-section"><h3>🚌 Najbližšie MHD zastávky</h3>';
  if (item.najblizsia_mhd && item.najblizsia_mhd.length > 0) {
    item.najblizsia_mhd.forEach((s, i) => {
      const wheelchair = s.wheelchair ? ' ♿' : '';
      mhdHtml += `<div class="mhd-item">
        <div class="mhd-num">${i + 1}</div>
        <div class="mhd-info">
          <div class="mname">${s.nazov}${wheelchair}</div>
          <div class="mdetail">Zóna: ${s.zona}</div>
        </div>
        <div class="mhd-dist">${s.vzdialenost_m} m</div>
      </div>`;
    });
  } else {
    mhdHtml += '<div style="font-size:12px;color:var(--text3)">-</div>';
  }
  mhdHtml += '</div>';

  // Poisťovne pre detail
  const poistDetail = (item.poistovne && item.poistovne.length > 0)
    ? item.poistovne.map(p => `<span class="tag tag-poist">${p}</span>`).join(' ')
    : '<span style="color:var(--text3);font-size:12px">-</span>';

  panel.innerHTML = `
    <div class="detail-header">
      <button class="detail-close" onclick="closeDetail()" title="Zavrieť detail">✕</button>
      <h2>${item.nazov}</h2>
      <div>${shownTags} ${moreTags} ${druhTag}</div>
      <div style="margin-top:6px"><span style="font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);font-weight:600">Poisťovne:</span> ${poistDetail}</div>
      <div class="meta">
        <span>📍 ${item.adresa}</span>
        <span>🏢 IČO: ${item.ico}</span>
        <span>🩺 ${item.forma_pece}</span>
      </div>
    </div>
    <div class="detail-body">
      <div class="detail-left">
        ${contact}
        ${accessHtml}
        ${hoursHtml}
        ${mhdHtml}
        ${pharmHtml}
      </div>
      <div class="detail-right">
        <div id="map"></div>
      </div>
    </div>`;

  setTimeout(() => initMap(item), 50);
}

function showEmptyDetail(noResults) {
  document.getElementById('detailPanel').innerHTML = `
    <div class="detail-empty"><div>
      <div style="font-size:36px;margin-bottom:10px">${noResults ? '😕' : '🔍'}</div>
      <p>${noResults ? 'Žiadne výsledky pre tento výraz' : 'Klikni na riadok pre zobrazenie detailu'}</p>
    </div></div>`;
}

// ==================== MAP ====================

function initMap(item) {
  if (map) { map.remove(); map = null; }
  const el = document.getElementById('map');
  if (!el || !item.lat || !item.lon) return;

  map = L.map('map', { zoomControl: false }).setView([item.lat, item.lon], 15);
  L.control.zoom({ position: 'topright' }).addTo(map);

  // Svetlá mapa — CartoDB Positron
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '©<a href="https://www.openstreetmap.org/copyright">OSM</a> ©<a href="https://carto.com/">CARTO</a>',
    maxZoom: 19,
    subdomains: 'abcd'
  }).addTo(map);

  // Lekárne — ružové markery (added FIRST = lower layer)
  const bounds = [[item.lat, item.lon]];
  (item.najblizsia_lekaren || []).forEach(p => {
    const pIcon = L.divIcon({
      html: '<div style="background:#b83280;width:16px;height:16px;border-radius:50%;border:2.5px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.25)"></div>',
      iconSize: [16, 16], iconAnchor: [8, 8], className: ''
    });
    L.marker([p.lat, p.lon], { icon: pIcon, zIndexOffset: 100 }).addTo(map)
      .bindPopup(`<b>💊 ${p.nazov}</b><br>${p.adresa}<br><span style="color:#16864e;font-weight:600">${p.vzdialenost_km} km</span>`);
    bounds.push([p.lat, p.lon]);
  });

  // MHD zastávky — oranžové markery
  (item.najblizsia_mhd || []).forEach(s => {
    const sIcon = L.divIcon({
      html: '<div style="background:#c27317;width:16px;height:16px;border-radius:4px;border:2.5px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.25)"></div>',
      iconSize: [16, 16], iconAnchor: [8, 8], className: ''
    });
    L.marker([s.lat, s.lon], { icon: sIcon, zIndexOffset: 100 }).addTo(map)
      .bindPopup(`<b>🚌 ${s.nazov}</b><br><span style="color:#c27317;font-weight:600">${s.vzdialenost_m} m</span>`);
    bounds.push([s.lat, s.lon]);
  });

  // Zariadenie — modrý marker (added LAST with highest zIndex = always on top)
  const facIcon = L.divIcon({
    html: '<div style="background:#1a82c4;width:22px;height:22px;border-radius:50%;border:3px solid #fff;box-shadow:0 3px 12px rgba(0,0,0,.3)"></div>',
    iconSize: [22, 22], iconAnchor: [11, 11], className: ''
  });
  L.marker([item.lat, item.lon], { icon: facIcon, zIndexOffset: 1000 }).addTo(map)
    .bindPopup(`<b>${item.nazov}</b><br>${item.adresa}`);

  if (bounds.length > 1) map.fitBounds(bounds, { padding: [30, 30] });
}

// ==================== INTERACTIONS ====================

function selectRow(id) {
  selectedId = id;
  document.getElementById('mainLayout').classList.add('has-detail');
  renderTable();
  loadDetail(id);
}

function closeDetail() {
  selectedId = null;
  document.getElementById('mainLayout').classList.remove('has-detail');
  document.getElementById('detailPanel').innerHTML = '';
  renderTable();
}

function goPage(p) {
  const totalPages = Math.ceil(totalResults / PAGE_SIZE);
  currentPage = Math.max(0, Math.min(p, totalPages - 1));
  doSearch(currentQuery);
  document.getElementById('tablePanel').scrollTop = 0;
}

function showSuggestions(q, box) {
  const norm = q.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
  const matches = suggestionsData.filter(s =>
    s.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase().includes(norm)
  ).slice(0, 8);
  if (!matches.length) { box.classList.remove('active'); return; }
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  box.innerHTML = matches.map(m =>
    `<div data-val="${m}">${m.replace(re, '<mark>$1</mark>')}</div>`
  ).join('');
  box.classList.add('active');
  box.querySelectorAll('div').forEach(d => {
    d.addEventListener('mousedown', (e) => {
      e.preventDefault();
      document.getElementById('searchInput').value = d.dataset.val;
      box.classList.remove('active');
      currentPage = 0;
      doSearch(d.dataset.val);
    });
  });
}

function updateSel(items, idx) {
  items.forEach((el, i) => el.classList.toggle('sel', i === idx));
}

// ==================== LOCATION FILTER ====================

function setLocationStatus(cls, text, autohide) {
  const el = document.getElementById('addressStatus');
  el.className = 'address-status show ' + cls;
  el.textContent = text;
  if (autohide) setTimeout(() => { el.className = 'address-status'; }, 3000);
}

function activateLocation(lat, lon, label) {
  locationLat = lat;
  locationLon = lon;
  locationActive = true;
  const inp = document.getElementById('addressInput');
  inp.classList.add('active-filter');
  document.getElementById('addressClear').style.display = 'block';
  if (label) inp.value = label;
  setLocationStatus('success', '📍 ' + label, true);
  currentPage = 0;
  selectedId = null;
  doSearch(currentQuery);
}

function clearLocation() {
  locationLat = null;
  locationLon = null;
  locationActive = false;
  const inp = document.getElementById('addressInput');
  inp.value = '';
  inp.classList.remove('active-filter');
  document.getElementById('addressClear').style.display = 'none';
  document.getElementById('addressStatus').className = 'address-status';
  document.getElementById('gpsBtn').classList.remove('active');
  currentPage = 0;
  doSearch(currentQuery);
}

async function geocodeAddress(address) {
  setLocationStatus('loading', 'Hľadám adresu…', false);
  try {
    const q = encodeURIComponent(address + ', Jihomoravský kraj, Česko');
    const resp = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}&limit=1&countrycodes=cz`);
    if (resp.ok) {
      const ct = resp.headers.get('content-type') || '';
      if (ct.includes('json')) {
        const data = await resp.json();
        if (data && data.length > 0) {
          const name = data[0].display_name.split(',').slice(0, 2).join(',').trim();
          activateLocation(parseFloat(data[0].lat), parseFloat(data[0].lon), name);
          document.getElementById('gpsBtn').classList.remove('active');
          return;
        }
      }
    }
  } catch (e) { console.warn('Nominatim error:', e); }
  setLocationStatus('error', 'Adresa nenájdená', true);
}

function useMyLocation() {
  const btn = document.getElementById('gpsBtn');
  if (!navigator.geolocation) {
    setLocationStatus('error', 'Geolokácia nie je podporovaná', true);
    return;
  }
  btn.classList.add('loading');
  setLocationStatus('loading', 'Zisťujem polohu…', false);

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      btn.classList.remove('loading');
      btn.classList.add('active');
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;
      activateLocation(lat, lon, 'Moja poloha');
    },
    (err) => {
      btn.classList.remove('loading');
      let msg = 'Nepodarilo sa zistiť polohu';
      if (err.code === 1) msg = 'Prístup k polohe bol zamietnutý';
      else if (err.code === 2) msg = 'Poloha nie je dostupná';
      else if (err.code === 3) msg = 'Časový limit vypršal';
      setLocationStatus('error', msg, true);
    },
    { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
  );
}

// ==================== FILTERS ====================

function toggleFilter(btn) {
  const filter = btn.dataset.filter;
  const value = btn.dataset.value;

  if (filter === 'wc') {
    if (btn.classList.contains('active-green')) {
      btn.classList.remove('active-green');
      activeFilters.wc = null;
    } else {
      btn.classList.add('active-green');
      activeFilters.wc = value;
    }
  } else {
    btn.classList.toggle('active');
    const arr = activeFilters[filter];
    const idx = arr.indexOf(value);
    if (idx >= 0) arr.splice(idx, 1);
    else arr.push(value);
  }

  updateFilterClearBtn();
  currentPage = 0;
  doSearch(currentQuery);
}

function clearAllFilters() {
  activeFilters = { pristup: [], poistovna: [], wc: null };
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active', 'active-green'));
  updateFilterClearBtn();
  currentPage = 0;
  doSearch(currentQuery);
}

function updateFilterClearBtn() {
  const hasAny = activeFilters.pristup.length > 0 || activeFilters.poistovna.length > 0 || activeFilters.wc !== null;
  document.getElementById('filterClear').classList.toggle('show', hasAny);
}

document.addEventListener('DOMContentLoaded', init);
</script>
